<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaveLance - Gestão de Poupança Digital</title>
    <meta name="description" content="SaveLance: Uma aplicação web moderna e inteligente para gerir as suas poupanças." />
  </head>
  <body class="bg-darkBg text-slate-100 selection:bg-techCyan/35 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker do SaveLance ativo!', reg.scope))
            .catch(err => console.error('Falha ao registar o Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
